<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vocabulary Practice</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
        margin: 0;
      }

      .box {
        border: 3px solid black;
        padding: 20px;
        margin: 20px auto;
        width: 80%;
        max-width: 600px;
        background-color: #f9f9f9;
        border-radius: 10px;
        text-align: center;
      }

      #user-display {
        font-size: 16px;
        font-weight: bold;
      }

      #user-display a {
        text-decoration: none;
        color: blue;
        margin-left: 10px;
      }

      #user-display a:hover {
        text-decoration: underline;
      }

      #wordBox {
        font-size: 18px;
      }

      #inputBox {
        width: 80%;
        max-width: 360px;
        padding: 8px;
        font-size: 16px;
      }

      #message {
        margin-top: 8px;
        min-height: 1.2em;
        font-size: 16px;
        font-weight: bold;
      }

      #solution {
        margin-top: 4px;
        font-weight: bold;
        min-height: 1.2em;
      }

      #statusBar {
        margin-bottom: 8px;
      }

      #saveChangesButton,
      #checkButton,
      #answerButton {
        padding: 8px 12px;
        font-size: 15px;
        margin: 2px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <!-- HEAD -->
    <div id="head-placeholder"></div>

    <!-- MAIN CONTENT -->
    <div class="box">
      <h1 id="page-title" style="font-size: 28px;">Vocabulary Practice</h1>

      <div id="statusBar" style="margin-bottom: 8px;">
        <span id="remainingLabel">Words remaining: <span id="remainingCount">—</span></span>
      </div>

      <div id="wordBox">word: <span id="currentWord"></span></div>
      <br />
      <input type="text" id="inputBox" placeholder="Enter your answer here..." />
      <button id="checkButton">Check</button>
      <button id="answerButton">Show answer</button>
      <div id="message"></div>
      <div id="solution"></div>
    </div>

    <button id="saveChangesButton">Save progress</button>
    <br /><br />

    <!-- NAVIGATION BAR -->
    <div id="nav-placeholder"></div>

    <!-- SCRIPT -->
    <script>
      async function includeHTML(file, elementId) {
        try {
          const response = await fetch(file);
          if (!response.ok) {
            throw new Error(`Error fetching ${file}: ${response.statusText}`);
          }

          const content = await response.text();
          const placeholder = document.getElementById(elementId);

          const tempDiv = document.createElement("div");
          tempDiv.innerHTML = content;

          const scripts = Array.from(tempDiv.querySelectorAll("script")).map((script) => {
            const newScript = document.createElement("script");
            Array.from(script.attributes).forEach(attr => {
              newScript.setAttribute(attr.name, attr.value);
            });
            newScript.textContent = script.textContent;
            script.remove();
            return newScript;
          });

          const fragment = document.createDocumentFragment();
          while (tempDiv.firstChild) {
            fragment.appendChild(tempDiv.firstChild);
          }

          placeholder.replaceWith(fragment);

          scripts.forEach((script) => {
            document.body.appendChild(script);
          });
        } catch (error) {
          console.error("Failed to load content:", error);
          const target = document.getElementById(elementId);
          if (target) {
            target.textContent = "Failed to load content.";
          }
        }
      }

      // Page-specific configuration
      const pageConfig = {
        chinese: {
          tsv: "../dicts/chinese_vocab.tsv",
          title: "中英翻译练习",
          type_here: "在这里输入中文词汇..."
        },
        hiragana_monographs: {
          tsv: "../dicts/hiragana_monographs.tsv",
          title: "ひらがな五十音の練習（発音区別符号付き）",
          type_here: "ここに入力..."
        },
        katakana_monographs: {
          tsv: "../dicts/katakana_monographs.tsv",
          title: "カタカナ五十音の練習（発音区別符号付き）",
          type_here: "ここに入力..."
        },
        general_korean: {
          tsv: "../dicts/general_korean.tsv",
          title: "한영 일반 단어 연습",
          type_here: "여기 한글을 입력하세요..."
        },
        personal_korean: {
          tsv: "../dicts/personal_korean.tsv",
          title: "한영 개인 단어 연습",
          type_here: "여기 한글을 입력하세요..."
        }
      };

      const urlParams = new URLSearchParams(window.location.search);
      let lang = urlParams.get("lang") || "chinese";
      if (!pageConfig[lang]) {
        console.warn(`Invalid lang value: ${lang}. Falling back to default "chinese".`);
        lang = "chinese";
      }

      // Dynamic content updates
      document.getElementById("page-title").textContent = pageConfig[lang].title;
      document.getElementById("inputBox").placeholder = pageConfig[lang].type_here;

      // --- State ---
      let pairs = [];
      let order = [];
      let currentIndex = null;
      let changes = {};
      let first_try = true;

      // Elements
      const wordBox = document.getElementById("currentWord");
      const messageElement = document.getElementById("message");
      const inputBox = document.getElementById("inputBox");
      const solutionElement = document.getElementById("solution");
      const remainingCountEl = document.getElementById("remainingCount");

      function fisherYatesShuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
      }

      function updateRemainingCount() {
        remainingCountEl.textContent = order.length;
      }

      async function loadTSVFile() {
        try {
          const response = await fetch(pageConfig[lang].tsv);
          if (!response.ok) {
            throw new Error(`Error fetching TSV: ${response.statusText}`);
          }

          const tsvText = await response.text();

          const lines = tsvText
            .split(/\r?\n/)
            .map(l => l.trim())
            .filter(Boolean);

          pairs = lines.map(line => {
            const cols = line.split("\t");
            const answer = (cols[0] ?? "").trim();
            const hint = (cols[1] ?? "").trim();
            const weight = cols[2] !== undefined ? Number(cols[2]) : 1;
            return { answer, hint, weight };
          });

          if (pairs.length === 0) {
            messageElement.textContent = "No words available.";
            messageElement.style.color = "red";
            return;
          }

          order = pairs.map((_, i) => i);
          fisherYatesShuffle(order);
          updateRemainingCount();
          nextPair();
        } catch (error) {
          console.error("Error loading the TSV file:", error);
          messageElement.textContent = "Error loading the word list. Please try again.";
          messageElement.style.color = "red";
        }
      }

      function nextPair() {
        solutionElement.textContent = "";

        if (order.length === 0) {
          order = pairs.map((_, i) => i);
          fisherYatesShuffle(order);

          messageElement.textContent = "Restarting...";
          messageElement.style.color = "green";

          setTimeout(() => {
            messageElement.textContent = "";
            nextPair();
          }, 1000);
          return;
        }

        currentIndex = order.shift();
        const currentPair = pairs[currentIndex];
        wordBox.textContent = currentPair.hint;
        messageElement.textContent = "";
        inputBox.value = "";
        first_try = true;

        updateRemainingCount();
      }

      function checkWord() {
        if (currentIndex === null) return;

        const currentPair = pairs[currentIndex];
        const userInput = inputBox.value.trim().toLowerCase();

        if (userInput === currentPair.answer.toLowerCase()) {
          messageElement.textContent = "Correct!";
          messageElement.style.color = "green";

          if (first_try) {
            changes[currentPair.answer] = (changes[currentPair.answer] ?? 0) + 1;
          }

          first_try = true;
          setTimeout(() => {
            messageElement.textContent = "";
            nextPair();
          }, 600);
        } else {
          messageElement.textContent = "Incorrect. Try again.";
          messageElement.style.color = "red";
          first_try = false;
          setTimeout(() => {
            messageElement.textContent = "";
          }, 800);
        }
      }

      function showAnswer() {
        if (currentIndex === null) return;
        solutionElement.textContent = pairs[currentIndex].answer;
        setTimeout(() => {
          solutionElement.textContent = "";
        }, 3000);
      }

      async function saveChanges() {
        pairs.forEach(p => {
          if (changes[p.answer]) {
            p.weight = (Number(p.weight) || 0) + changes[p.answer];
          }
        });

        const updatedTSV = pairs
          .map(p => `${p.answer}\t${p.hint}\t${p.weight}`)
          .join("\n");

        try {
          const response = await fetch("/api/save-updated-tsv", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              lang,
              tsvPath: pageConfig[lang].tsv,
              content: updatedTSV
            })
          });

          if (response.ok) {
            alert("Changes saved successfully!");
            changes = {};
          } else {
            alert("Failed to save changes on server. Downloading local backup instead.");
            downloadBackup(updatedTSV);
          }
        } catch (error) {
          downloadBackup(updatedTSV);
        }
      }

      function downloadBackup(updatedTSV) {
        const blob = new Blob([updatedTSV], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `updated_${lang}.tsv`;
        link.click();
      }

      document.getElementById("checkButton").addEventListener("click", checkWord);
      inputBox.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          checkWord();
        }
      });
      document.getElementById("answerButton").addEventListener("click", showAnswer);
      document.getElementById("saveChangesButton").addEventListener("click", saveChanges);

      window.addEventListener("beforeunload", (event) => {
        if (Object.keys(changes).length > 0) {
          event.preventDefault();
          event.returnValue = "You have unsaved changes. Do you want to leave without saving?";
        }
      });

      document.addEventListener("DOMContentLoaded", async () => {
        await includeHTML("../partials/head.html", "head-placeholder");
        await includeHTML("../partials/nav.html", "nav-placeholder");
        await loadTSVFile();
      });
    </script>
  </body>
</html>
