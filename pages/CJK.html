<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Put charset early to avoid mojibake -->
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CJK Wiktionary Lookup – Demo</title>

  <style>
    :root{
      --bg:#0f172a; --panel:#111827; --card:#0b1220; --text:#e5e7eb; --muted:#9ca3af;
      --accent:#22d3ee; --accent-2:#a78bfa; --radius:16px;
    }
    html,body{height:100%;}
    body{
      margin:0;
      background:linear-gradient(135deg,var(--bg),#020617);
      color:var(--text);
      font-family:
        ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
        "Noto Sans CJK KR","Noto Sans CJK JP","Noto Sans SC","Noto Sans TC",
        "Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol";
    }
    .wrap{max-width:920px;margin:40px auto;padding:0 16px;}
    header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
    .logo{width:36px;height:36px;border-radius:10px;background:conic-gradient(from 180deg at 50% 50%,var(--accent),var(--accent-2));box-shadow:0 0 24px #22d3ee44;}
    h1{font-size:22px;margin:0;letter-spacing:.2px}

    .panel{background:rgba(17,24,39,.7);backdrop-filter: blur(6px);border:1px solid #334155;border-radius: var(--radius);padding:16px;box-shadow:0 8px 24px #0006}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .input{flex:1 1 420px;display:flex;align-items:center;background:#0b1220;border:1px solid #1f2937;border-radius:12px;padding:8px 12px}
    .input input{all:unset;color:var(--text);flex:1;font-size:16px}
    .btn{appearance:none;border:1px solid #334155;background:#0b1220;color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;transition:.15s;}
    .btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px #0007;border-color:#475569}
    .btn.primary{background:linear-gradient(135deg,#22d3ee33,#a78bfa33);border-color:#64748b}
    .btn.ghost{background:transparent}
    .hint{margin-top:10px;color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:16px}
    .card{background:var(--card);border:1px solid #1f2a44;border-radius:14px;padding:14px 14px 12px}
    .card h3{margin:0 0 8px;font-size:16px;letter-spacing:.2px}
    .kicker{color:var(--muted);font-size:12px;margin-bottom:8px}
    .big{font-size:18px;line-height:1.4}
    .code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#0b1220;border:1px solid #1f2937;border-radius:10px;padding:2px 6px;display:inline-block}
    .actions{display:flex;gap:8px;align-items:center;margin-top:10px}
    .pill{font-size:12px;border:1px solid #334155;border-radius:999px;padding:4px 8px;color:var(--muted)}
    .copy{font-size:12px;border:1px solid #334155;border-radius:10px;padding:6px 8px;background:#0b1220;color:var(--text);cursor:pointer}
    .variants{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .variant{border:1px dashed #334155;border-radius:10px;padding:4px 8px;font-size:12px;color:#cbd5e1}
    .footer{margin:28px 0 12px;color:#94a3b8;font-size:12px}
    .link{color:#93c5fd;text-decoration:none;border-bottom:1px dashed #475569}
    .loading{display:inline-flex;gap:8px;align-items:center}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:b 1.2s infinite ease-in-out}
    .dot:nth-child(2){animation-delay:.15s}
    .dot:nth-child(3){animation-delay:.3s}
    @keyframes b{0%,80%,100%{opacity:.2;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}
    .error{color:#fecaca;background:#7f1d1d33;border:1px solid #7f1d1d;padding:10px 12px;border-radius:10px;margin-top:12px}

    /* Centered white nav box */
    .nav-container{
      max-width:920px;
      margin:24px auto 32px auto;
      padding:14px 18px;
      background:#ffffff;
      color:#111827;
      border:1px solid #e5e7eb;
      border-radius:14px;
      box-shadow:0 6px 18px rgba(0,0,0,.06);
    }
    .nav-container .nav-inner{
      display:flex;
      flex-wrap:wrap;
      gap:14px 18px;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
    .nav-container a{
      color:#111827;
      text-decoration:none;
      padding:6px 10px;
      border-radius:10px;
      border:1px solid transparent;
    }
    .nav-container a:hover{
      border-color:#e5e7eb;
      background:#f8fafc;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="logo" aria-hidden="true"></div>
      <h1>CJK Wiktionary Lookup</h1>
    </header>

    <section class="panel">
      <div class="row">
        <label class="input" for="q">
          <input id="q" name="q" placeholder="Type a term… e.g., 歡迎 / 欢迎 / 歓迎 / 환영" autofocus />
        </label>
        <button class="btn primary" id="btnGo">Search</button>
        <button class="btn ghost" id="btnClear" title="Clear">Clear</button>
      </div>
      <div class="hint">This demo loads static JSON from <code>/data/</code> (<code>zh.json</code>, <code>ja.json</code>, <code>ko.json</code>).</div>
      <div id="status" class="hint" aria-live="polite"></div>
    </section>

    <section id="variantsPanel" class="panel" style="display:none;margin-top:14px">
      <div class="kicker">Normalized variants</div>
      <div id="variants" class="variants"></div>
    </section>

    <section id="results" class="grid" aria-live="polite" style="display:none"></section>

    <div class="footer">
      Definitions/forms from Wiktionary • CC BY-SA. Please attribute and link source pages.
    </div>
  </div>

  <!-- Centered white nav box -->
  <div id="nav-slot"></div>
  <script>
    // Use a relative path so it works on GitHub Pages subfolders too
    fetch('./partials/nav.html')
      .then(r => r.ok ? r.text() : '')
      .then(html => {
        if (!html) return;
        // Your partial already wraps links in <nav>…</nav>. Strip it to avoid nested navs.
        const cleaned = html.replace(/<\/?nav[^>]*>/g,'').trim();
        document.getElementById('nav-slot').innerHTML =
          `<nav class="nav-container"><div class="nav-inner">${cleaned}</div></nav>`;
      })
      .catch(()=>{});
  </script>

  <script>
    const $ = (s, r=document)=> r.querySelector(s);
    const $$ = (s, r=document)=> [...r.querySelectorAll(s)];
    const q = $('#q');
    const btnGo = $('#btnGo');
    const btnClear = $('#btnClear');
    const statusEl = $('#status');
    const resEl = $('#results');
    const variantsPanel = $('#variantsPanel');
    const variantsEl = $('#variants');

    function setStatus(html){ statusEl.innerHTML = html || ''; }
    function setLoading(on){
      if(on){ setStatus(`<span class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span> Loading…</span>`); }
      else setStatus('');
    }

    let zhData, jaData, koData;

    async function loadData() {
      if (!zhData) {
        [zhData, jaData, koData] = await Promise.all([
          fetch('./data/zh.json').then(r => r.json()),
          fetch('./data/ja.json').then(r => r.json()),
          fetch('./data/ko.json').then(r => r.json())
        ]);
      }
    }

    const normalizeKey = t => (t || '').trim();
    function findEntry(db, t){
      const key = normalizeKey(t);
      const ali = db.aliases[key];
      return db.entries[ali || key];
    }

    async function lookup(term) {
      await loadData();
      return {
        mandarin: findEntry(zhData, term),
        japanese: findEntry(jaData, term),
        korean: findEntry(koData, term)
      };
    }

    function render(data){
      const v = {};
      if (data.mandarin) v.Mandarin = data.mandarin.head;
      if (data.japanese) v.Japanese = data.japanese.head;
      if (data.korean) v.Korean = data.korean.head;
      const items = Object.entries(v);
      if(items.length){
        variantsPanel.style.display = '';
        variantsEl.innerHTML = items.map(([k,val])=> `<span class="variant" title="${k}">${val}</span>`).join('');
      }else{
        variantsPanel.style.display = 'none';
      }

      const cards = [];
      const r = data;

      if(r.mandarin){
        cards.push(card(
          'Mandarin',
          `${escapeHTML(r.mandarin.head)} – <span class="code">${escapeHTML(r.mandarin.pinyin || '')}</span>`,
          r.mandarin.senses,
          r.mandarin.wiktionary_url,
          `${r.mandarin.head}${r.mandarin.pinyin ? ' - ' + r.mandarin.pinyin : ''} = ${(r.mandarin.senses||[]).join('; ')}`
        ));
      }
      if(r.korean){
        cards.push(card(
          'Korean',
          `${escapeHTML(r.korean.head)} – <span class="code">${escapeHTML(r.korean.rr || '')}</span>`,
          r.korean.senses,
          r.korean.wiktionary_url,
          `${r.korean.head}${r.korean.rr ? ' - ' + r.korean.rr : ''} = ${(r.korean.senses||[]).join('; ')}`
        ));
      }
      if(r.japanese){
        const head = `${escapeHTML(r.japanese.head)}${r.japanese.kana ? `（${escapeHTML(r.japanese.kana)}）` : ''}`;
        cards.push(card(
          'Japanese',
          head,
          r.japanese.senses,
          r.japanese.wiktionary_url,
          `${r.japanese.head}${r.japanese.kana ? `(${r.japanese.kana})` : ''} = ${(r.japanese.senses||[]).join('; ')}`
        ));
      }

      resEl.style.display = cards.length ? '' : 'none';
      resEl.innerHTML = cards.join('');

      $$('.copy', resEl).forEach(btn=>{
        btn.addEventListener('click', async () => {
          const text = btn.getAttribute('data-copy') || '';
          try{
            await navigator.clipboard.writeText(text);
            btn.textContent = 'Copied!';
            setTimeout(()=> btn.textContent='Copy', 1200);
          }catch{
            btn.textContent = 'Copy failed';
            setTimeout(()=> btn.textContent='Copy', 1600);
          }
        });
      });
    }

    function card(label, headlineHTML, senses, url, copyText){
      const sensesHTML = (senses && senses.length)
        ? senses.slice(0,3).map(s=> `<li>${escapeHTML(s)}</li>`).join('')
        : '<li><em>No senses found</em></li>';
      return `
      <article class="card">
        <div class="kicker">${label}</div>
        <h3 class="big">${headlineHTML}</h3>
        <ul>${sensesHTML}</ul>
        <div class="actions">
          <span class="pill">Top senses</span>
          ${url ? `<a class="link" href="${url}" target="_blank" rel="noopener">Wiktionary</a>` : ''}
          <button class="copy" data-copy="${escapeHTML(copyText || '')}" title="Copy line">Copy</button>
        </div>
      </article>`;
    }

    function escapeHTML(s){
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));
    }

    async function run(){
      const term = q.value.trim();
      if(!term){ resEl.style.display='none'; $('#variantsPanel').style.display='none'; setStatus(''); return; }
      setLoading(true);
      try{
        const data = await lookup(term);
        setLoading(false);
        render(data);
        if(!data.mandarin && !data.japanese && !data.korean){
          setStatus(`<div class="error">No matches found. Try another form (e.g., simplified vs. traditional, kana/kanji, hangul/hanja).</div>`);
        }
      }catch(err){
        setLoading(false);
        resEl.style.display='none';
        $('#variantsPanel').style.display='none';
        setStatus(`<div class="error">Lookup failed. ${escapeHTML(err.message || err)}</div>`);
      }
    }

    $('#btnGo').addEventListener('click', run);
    $('#btnClear').addEventListener('click', ()=>{ q.value=''; resEl.style.display='none'; $('#variantsPanel').style.display='none'; setStatus(''); q.focus(); });
    q.addEventListener('keydown', (e)=>{ if(e.key==='Enter') run(); });
  </script>
</body>
</html>
