<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Vocabulary Practice</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                text-align: center;
                padding: 20px;
            }
            #message {
                margin-top: 20px;
                font-size: 18px;
                font-weight: bold;
            }
            .box {
                border: 3px solid black;
                padding: 20px;
                margin: 20px auto;
                width: 80%;
                max-width: 600px;
                background-color: #f9f9f9;
                border-radius: 10px;
                text-align: center;
            }
            #user-display {
                font-size: 16px;
                font-weight: bold;
            }
            #user-display a {
                text-decoration: none;
                color: blue;
                margin-left: 10px;
            }
            #user-display a:hover {
                text-decoration: underline;
            }
            #wordsLeft {
                font-size: 16px;
                font-weight: bold;
            }
            #wordBox {
                font-size: 18px;
            }
            #japanInput {
                width: 80%;
                max-width: 320px;
                padding: 8px;
                font-size: 16px;
            }
            button {
                padding: 8px 12px;
                font-size: 15px;
                margin: 2px;
                cursor: pointer;
            }
            #solution {
                margin-top: 10px;
                font-size: 16px;
            }
            select {
                margin-bottom: 12px;
                padding: 6px 8px;
                font-size: 15px;
            }
        </style>
    </head>

    <body>
        <!-- HEAD -->
        <div id="head-placeholder"></div>

        <!-- MAIN CONTENT -->
        <label for="vocabList">vocab list:</label>
        <select id="vocabList"></select>

        <div class="box">
            <!-- <h1 id="page-title">日英翻訳練習</h1> -->

            <div id="wordsLeft">Number of words left: 0</div><br>
            <div id="wordBox"><b>Translate word: </b><span id="currentWord"></span></div><br>

            <input type="text" id="japanInput" placeholder="ここに入力..." /><br><br>

            <button id="checkButton">Check</button>
            <button id="answerButton">Show Answer</button>
            <button id="skipButton">Skip</button>
            <div id="message"></div>
            <div id="solution"></div>
        </div>
        <br><br>

        <!-- NAVIGATION BAR -->
        <div id="nav-placeholder"></div>

        <!-- SCRIPT -->
        <script>
            /////////////////////////
            // SELECT A VOCAB LIST //
            /////////////////////////
            const optionsList = [
                "あいさつ　(Greetings)",
                "第１課：あたらしいともだち　(New Friends)",
                "第２課：かいもの　(Shopping)",
                "第３課：デートの約束　 (Making a Date)",
                "第４課：初めてのデート　(The First Date)",
                "第５課：沖縄旅行　(A Trip to Okinawa)",
                "第６課：ロバートさんの一日　(A Day in Robert's Life)",
                "第７課：家族の写真　(Family Picture)",
                "第８課：バーベキュー　(Barbecue)",
                "第９課：かぶき　(Kabuki)",
                "第１０課：冬休みの予定　(Winter Vacation Plans)",
                "第１１課：休みのあと　(After the Vacation)",
                "第１２課：病気　(Illness)"
            ];

            let tsv_name = optionsList[0] + ".tsv";
            const dropdown = document.getElementById("vocabList");

            optionsList.forEach(optionText => {
                const option = document.createElement("option");
                option.value = optionText.toLowerCase().replace(/\s+/g, "-");
                option.textContent = optionText;
                dropdown.appendChild(option);
            });

            dropdown.addEventListener("change", function () {
                const selectedText = dropdown.options[dropdown.selectedIndex].text;
                tsv_name = selectedText + ".tsv";
                loadTSVFile();
            });
            /////////////////////////
            /////////////////////////

            async function includeHTML(file, elementId) {
                try {
                    const response = await fetch(file);
                    if (!response.ok) {
                        throw new Error(`Error fetching ${file}: ${response.statusText}`);
                    }

                    const content = await response.text();
                    const placeholder = document.getElementById(elementId);

                    const tempDiv = document.createElement("div");
                    tempDiv.innerHTML = content;

                    const scripts = Array.from(tempDiv.querySelectorAll("script")).map((script) => {
                        const newScript = document.createElement("script");
                        Array.from(script.attributes).forEach(attr => {
                            newScript.setAttribute(attr.name, attr.value);
                        });
                        newScript.textContent = script.textContent;
                        script.remove();
                        return newScript;
                    });

                    const fragment = document.createDocumentFragment();
                    while (tempDiv.firstChild) {
                        fragment.appendChild(tempDiv.firstChild);
                    }

                    placeholder.replaceWith(fragment);

                    scripts.forEach((script) => {
                        document.body.appendChild(script);
                    });
                } catch (error) {
                    console.error("Failed to load content:", error);
                    const target = document.getElementById(elementId);
                    if (target) {
                        target.textContent = "Failed to load content.";
                    }
                }
            }

            includeHTML("../partials/head.html", "head-placeholder");
            includeHTML("../partials/nav.html", "nav-placeholder");

            // Initialize variables
            let pairs = [];
            let currentPair = {};
            let changes = {};
            let first_try = true;
            let unusedPairs = [];

            // DOM elements
            const wordBox = document.getElementById("currentWord");
            const japanInput = document.getElementById("japanInput");
            const messageElement = document.getElementById("message");
            const solutionElement = document.getElementById("solution");

            function generateNewPair() {
                if (unusedPairs.length === 0) {
                    unusedPairs = [...pairs];
                    console.log("All pairs used. Resetting...");
                }

                const randomIndex = Math.floor(Math.random() * unusedPairs.length);
                currentPair = unusedPairs.splice(randomIndex, 1)[0];

                wordBox.textContent = currentPair.eng;
                japanInput.value = "";
                messageElement.textContent = "";
                solutionElement.textContent = "";

                updateWordsLeft();
            }

            function updateWordsLeft() {
                const wordsLeftElement = document.getElementById("wordsLeft");
                wordsLeftElement.textContent = `Words Left: ${unusedPairs.length}`;
            }

            // Load and parse the TSV file
            async function loadTSVFile() {
                try {
                    const response = await fetch("../dicts/genki/" + tsv_name);
                    if (!response.ok) {
                        throw new Error(`Error fetching TSV: ${response.statusText}`);
                    }

                    const tsvText = await response.text();

                    const lines = tsvText
                        .trim()
                        .split(/\r?\n/)
                        .filter(line => line.trim() !== "");

                    pairs = lines.map(line => {
                        const [japan, eng, kanji] = line.split("\t");
                        const japanTrimmed = japan?.trim() || "";
                        const kanjiTrimmed = kanji?.trim() || "";

                        return {
                            japan: japanTrimmed,
                            eng: eng?.trim() || "",
                            kanji: kanjiTrimmed,
                            acceptableAnswers: kanjiTrimmed
                                ? [japanTrimmed, kanjiTrimmed]
                                : [japanTrimmed],
                        };
                    });

                    unusedPairs = [...pairs];
                    updateWordsLeft();
                    generateNewPair();
                    japanInput.focus();
                } catch (error) {
                    console.error("Error loading the TSV file:", error);
                    messageElement.textContent = "Error loading the word list. Please try again.";
                    messageElement.style.color = "red";
                }
            }

            function loadWord() {
                setTimeout(() => {
                    generateNewPair();
                    japanInput.focus();
                }, 1000);
            }

            function checkWord() {
                const userJapan = japanInput.value.trim();
                const acceptableAnswers = currentPair.acceptableAnswers || [currentPair.japan];

                if (acceptableAnswers.includes(userJapan)) {
                    messageElement.textContent = "Correct!";
                    messageElement.style.color = "green";
                    if (first_try) {
                        changes[currentPair.eng] = (changes[currentPair.eng] || 0) + 1;
                    }
                    first_try = true;
                    loadWord();
                } else {
                    messageElement.textContent = "Incorrect! Try again.";
                    messageElement.style.color = "red";
                    first_try = false;
                }
            }

            function showAnswer() {
                solutionElement.textContent = currentPair.kanji
                    ? `${currentPair.japan} / ${currentPair.kanji}`
                    : `${currentPair.japan}`;

                setTimeout(() => {
                    solutionElement.textContent = "";
                }, 3000);
            }

            // Event listeners
            document.getElementById("checkButton").addEventListener("click", checkWord);

            japanInput.addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    checkWord();
                } else if (event.key === "Tab") {
                    event.preventDefault();
                    japanInput.focus();
                }
            });

            document.getElementById("answerButton").addEventListener("click", showAnswer);

            document.getElementById("skipButton").addEventListener("click", function () {
                first_try = true;
                messageElement.textContent = "";
                solutionElement.textContent = "";

                setTimeout(() => {
                    generateNewPair();
                    japanInput.focus();
                }, 1000);
            });

            loadTSVFile();
        </script>
    </body>
</html>
