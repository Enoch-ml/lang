<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Create Account</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                text-align: center;
                padding: 20px;
            }
            .box {
                border: 3px solid black;
                padding: 20px;
                margin: 20px auto;
                width: 80%;
                max-width: 600px;
                background-color: #f9f9f9;
                border-radius: 10px;
                text-align: center;
            }
            #message {
                margin-top: 20px;
                font-size: 18px;
                font-weight: bold;
            }
            #user-display {
                font-size: 16px;
                font-weight: bold;
            }
            #user-display a {
                text-decoration: none;
                color: blue;
                margin-left: 10px;
            }
            #user-display a:hover {
                text-decoration: underline;
            }
            .validation {
                min-height: 1.2em;
                font-size: 14px;
            }
        </style>
    </head>

    <body>
        <!-- HEAD -->
        <div id="head-placeholder"></div>

        <!-- MAIN CONTENT -->
        <div class="box">
            <b>Create a new account:</b><br><br>

            Enter username:
            <input type="text" id="username" />
            <div id="valid_username" class="validation"></div><br>

            Enter password:
            <input type="password" id="password" />
            <div id="valid_password" class="validation"></div><br>

            Re-enter password:
            <input type="password" id="repassword" />
            <div id="valid_repassword" class="validation"></div><br><br>

            <button id="create_acc">Create new account</button><br>
            <div id="message"></div>
        </div>

        <!-- NAVIGATION BAR -->
        <div id="nav-placeholder"></div>

        <!-- SCRIPT -->
        <script>
            async function includeHTML(file, elementId) {
                try {
                    const response = await fetch(file);
                    if (!response.ok) {
                        throw new Error(`Error fetching ${file}: ${response.statusText}`);
                    }

                    const content = await response.text();
                    const placeholder = document.getElementById(elementId);

                    const tempDiv = document.createElement("div");
                    tempDiv.innerHTML = content;

                    const scripts = Array.from(tempDiv.querySelectorAll("script")).map((script) => {
                        const newScript = document.createElement("script");
                        Array.from(script.attributes).forEach(attr => {
                            newScript.setAttribute(attr.name, attr.value);
                        });
                        newScript.textContent = script.textContent;
                        script.remove();
                        return newScript;
                    });

                    const fragment = document.createDocumentFragment();
                    while (tempDiv.firstChild) {
                        fragment.appendChild(tempDiv.firstChild);
                    }

                    placeholder.replaceWith(fragment);

                    scripts.forEach((script) => {
                        document.body.appendChild(script);
                    });
                } catch (error) {
                    console.error("Failed to load content:", error);
                    document.getElementById(elementId).textContent = "Failed to load content.";
                }
            }

            includeHTML("../partials/head.html", "head-placeholder");
            includeHTML("../partials/nav.html", "nav-placeholder");

            let validUser = false;
            let validPass = false;
            let validRepass = false;

            const usernameInput = document.getElementById("username");
            const passwordInput = document.getElementById("password");
            const repasswordInput = document.getElementById("repassword");

            const validUsernameEl = document.getElementById("valid_username");
            const validPasswordEl = document.getElementById("valid_password");
            const validRepasswordEl = document.getElementById("valid_repassword");
            const messageEl = document.getElementById("message");

            function setValidation(el, text, color = "red") {
                el.textContent = text;
                el.style.color = text ? color : "";
            }

            async function validateUsername() {
                const username = usernameInput.value.trim();
                const validPattern = /^[a-zA-Z0-9_-]+$/;

                if (!username) {
                    validUser = false;
                    setValidation(validUsernameEl, "Username is required.");
                    return false;
                }

                if (!validPattern.test(username)) {
                    validUser = false;
                    setValidation(validUsernameEl, "Username must only consist of letters, numbers, _ and -.");
                    return false;
                }

                try {
                    const response = await fetch(`/api/check-username?username=${encodeURIComponent(username)}`);
                    const data = await response.json();

                    if (!response.ok) {
                        validUser = false;
                        setValidation(validUsernameEl, data.error || "Could not validate username.");
                        return false;
                    }

                    if (data.exists) {
                        validUser = false;
                        setValidation(validUsernameEl, "Username is taken. Please choose another.");
                        return false;
                    }

                    validUser = true;
                    setValidation(validUsernameEl, "", "green");
                    return true;
                } catch (error) {
                    console.error("Username validation failed:", error);
                    validUser = false;
                    setValidation(validUsernameEl, "Could not validate username.");
                    return false;
                }
            }

            function validatePassword() {
                const password = passwordInput.value;
                if (password.length < 6) {
                    validPass = false;
                    setValidation(validPasswordEl, "Password must contain 6+ characters.");
                    return false;
                }

                validPass = true;
                setValidation(validPasswordEl, "");
                return true;
            }

            function validateRepassword() {
                const password = passwordInput.value;
                const repassword = repasswordInput.value;

                if (!repassword) {
                    validRepass = false;
                    setValidation(validRepasswordEl, "Please re-enter your password.");
                    return false;
                }

                if (password !== repassword) {
                    validRepass = false;
                    setValidation(validRepasswordEl, "Passwords must match.");
                    return false;
                }

                validRepass = true;
                setValidation(validRepasswordEl, "");
                return true;
            }

            usernameInput.addEventListener("blur", validateUsername);
            passwordInput.addEventListener("blur", () => {
                validatePassword();
                if (repasswordInput.value) validateRepassword();
            });
            repasswordInput.addEventListener("blur", validateRepassword);

            async function createAccount() {
                messageEl.textContent = "";
                messageEl.style.color = "";

                const okUsername = await validateUsername();
                const okPassword = validatePassword();
                const okRepassword = validateRepassword();

                if (!(okUsername && okPassword && okRepassword)) {
                    messageEl.textContent = "Please fix the errors above.";
                    messageEl.style.color = "red";
                    return;
                }

                const username = usernameInput.value.trim();
                const password = passwordInput.value;

                try {
                    const response = await fetch("/api/create-account", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ username, password })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        messageEl.textContent = data.error || "Failed to create account.";
                        messageEl.style.color = "red";
                        return;
                    }

                    localStorage.setItem("loggedInUser", username);
                    messageEl.textContent = "Account created successfully.";
                    messageEl.style.color = "green";

                    setTimeout(() => {
                        window.location.href = "../index.html";
                    }, 1000);
                } catch (error) {
                    console.error("Create account failed:", error);
                    messageEl.textContent = "Server error. Please try again.";
                    messageEl.style.color = "red";
                }
            }

            document.getElementById("create_acc").addEventListener("click", createAccount);
        </script>
    </body>
</html>
