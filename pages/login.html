<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Login</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                text-align: center;
                padding: 20px;
            }
            .box {
                border: 3px solid black;
                padding: 20px;
                margin: 20px auto;
                width: 80%;
                max-width: 600px;
                background-color: #f9f9f9;
                border-radius: 10px;
                text-align: center;
            }
            #message {
                margin-top: 20px;
                font-size: 18px;
                font-weight: bold;
                min-height: 1.2em;
            }
            #user-display {
                font-size: 16px;
                font-weight: bold;
            }
            #user-display a {
                text-decoration: none;
                color: blue;
                margin-left: 10px;
            }
            #user-display a:hover {
                text-decoration: underline;
            }
            input {
                margin-top: 4px;
                margin-bottom: 10px;
                padding: 6px 8px;
                font-size: 15px;
            }
            button {
                padding: 8px 12px;
                font-size: 15px;
                cursor: pointer;
                margin: 0 4px;
            }
        </style>
    </head>

    <body>
        <!-- HEAD -->
        <div id="head-placeholder"></div>

        <!-- MAIN CONTENT -->
        <div class="box">
            <b>Login</b><br><br>

            Username:<br>
            <input type="text" id="username" autocomplete="username" /><br>

            Password:<br>
            <input type="password" id="password" autocomplete="current-password" /><br><br>

            <button id="check_login">Login</button>
            <button id="create_acc" type="button">Create new account</button>

            <div id="message"></div>
        </div>

        <!-- NAVIGATION BAR -->
        <div id="nav-placeholder"></div>

        <!-- SCRIPT -->
        <script>
            async function includeHTML(file, elementId) {
                try {
                    const response = await fetch(file);
                    if (!response.ok) {
                        throw new Error(`Error fetching ${file}: ${response.statusText}`);
                    }

                    const content = await response.text();
                    const placeholder = document.getElementById(elementId);

                    const tempDiv = document.createElement("div");
                    tempDiv.innerHTML = content;

                    const scripts = Array.from(tempDiv.querySelectorAll("script")).map((script) => {
                        const newScript = document.createElement("script");
                        Array.from(script.attributes).forEach(attr => {
                            newScript.setAttribute(attr.name, attr.value);
                        });
                        newScript.textContent = script.textContent;
                        script.remove();
                        return newScript;
                    });

                    const fragment = document.createDocumentFragment();
                    while (tempDiv.firstChild) {
                        fragment.appendChild(tempDiv.firstChild);
                    }

                    placeholder.replaceWith(fragment);

                    scripts.forEach((script) => {
                        document.body.appendChild(script);
                    });
                } catch (error) {
                    console.error("Failed to load content:", error);
                    document.getElementById(elementId).textContent = "Failed to load content.";
                }
            }

            includeHTML("../partials/head.html", "head-placeholder");
            includeHTML("../partials/nav.html", "nav-placeholder");

            const usernameInput = document.getElementById("username");
            const passwordInput = document.getElementById("password");
            const messageElement = document.getElementById("message");

            async function checkLogin() {
                const username = usernameInput.value.trim();
                const password = passwordInput.value;

                if (!username || !password) {
                    messageElement.textContent = "Please enter both username and password.";
                    messageElement.style.color = "red";
                    return;
                }

                try {
                    const response = await fetch("/api/login", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ username, password })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        messageElement.textContent = data.error || "Login failed.";
                        messageElement.style.color = "red";
                        return;
                    }

                    localStorage.setItem("loggedInUser", username);

                    messageElement.textContent = "Login successful! Redirecting...";
                    messageElement.style.color = "green";

                    setTimeout(() => {
                        window.location.href = "../index.html";
                    }, 1000);
                } catch (error) {
                    console.error("Login error:", error);
                    messageElement.textContent = "Server error. Please try again.";
                    messageElement.style.color = "red";
                }
            }

            document.getElementById("check_login").addEventListener("click", checkLogin);

            document.getElementById("create_acc").addEventListener("click", () => {
                window.location.href = "create_acc.html";
            });

            usernameInput.addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    checkLogin();
                }
            });

            passwordInput.addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    checkLogin();
                }
            });
        </script>
    </body>
</html>
