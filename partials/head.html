<div style="float: right;" id="user-display"></div>
<br>
<h1>practice CJK lang</h1>

<script>
    const loggedInUser = localStorage.getItem("loggedInUser");
    const userDisplayElement = document.getElementById("user-display");

    const pathParts = window.location.pathname.split("/").filter(Boolean);
    const isInPagesDir = pathParts[pathParts.length - 2] === "pages";
    const loginHref = isInPagesDir ? "login.html" : "pages/login.html";

    if (loggedInUser) {
        userDisplayElement.innerHTML = `
            <span>Welcome, ${loggedInUser}!</span>
            <a href="#" id="logout">Logout</a>
        `;

        document.getElementById("logout").addEventListener("click", () => {
            localStorage.removeItem("loggedInUser");
            window.location.reload();
        });
    } else {
        userDisplayElement.innerHTML = `<a href="${loginHref}">Login</a>`;
    }
</script>
